{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">

        <div class="text-center mb-4 animate-fade-in">
          <div class="brand-icon-lg mb-3">💪</div>
          <h2 class="fw-bold">Create Your Account</h2>
          <p class="text-muted">Join thousands transforming their health with AI</p>
        </div>

        <div class="card auth-card border-0 rounded-4 shadow-lg p-4 animate-slide-up">
          <form method="POST" action="{{ url_for('signup') }}" novalidate>
            <div class="mb-3">
              <label class="form-label fw-semibold small">Username</label>
              <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0">
                  <i class="bi bi-person text-muted"></i>
                </span>
                <input type="text" name="username" class="form-control border-start-0 ps-0"
                       placeholder="Choose a username" required minlength="3" maxlength="80"
                       autocomplete="username">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold small">Email Address</label>
              <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0">
                  <i class="bi bi-envelope text-muted"></i>
                </span>
                <input type="email" name="email" class="form-control border-start-0 ps-0"
                       placeholder="you@example.com" required autocomplete="email">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold small">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0">
                  <i class="bi bi-lock text-muted"></i>
                </span>
                <input type="password" name="password" id="passwordInput"
                       class="form-control border-start-0 border-end-0 ps-0"
                       placeholder="Min 8 characters" required minlength="8"
                       autocomplete="new-password" oninput="checkStrength(this.value)">
                <button class="btn btn-outline-secondary border-start-0" type="button"
                        onclick="togglePwd('passwordInput',this)">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
              <div class="mt-1">
                <div class="progress rounded-pill" style="height:4px">
                  <div id="strengthBar" class="progress-bar rounded-pill" style="width:0%"></div>
                </div>
                <small id="strengthText" class="text-muted"></small>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold small">Confirm Password</label>
              <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0">
                  <i class="bi bi-lock-fill text-muted"></i>
                </span>
                <input type="password" name="confirm_password" id="confirmInput"
                       class="form-control border-start-0 ps-0"
                       placeholder="Repeat your password" required minlength="8"
                       autocomplete="new-password">
              </div>
            </div>

            <button type="submit" class="btn btn-accent w-100 py-2 fw-semibold">
              <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
          </form>
        </div>

        <p class="text-center text-muted mt-4 small">
          Already have an account? 
          <a href="{{ url_for('login') }}" class="text-accent fw-semibold text-decoration-none">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>

{% block extra_scripts %}
<script>
function togglePwd(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('i');
  input.type = input.type === 'password' ? 'text' : 'password';
  icon.classList.toggle('bi-eye');
  icon.classList.toggle('bi-eye-slash');
}

function checkStrength(val) {
  const bar = document.getElementById('strengthBar');
  const text = document.getElementById('strengthText');
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    {pct:'25%', cls:'bg-danger', label:'Weak'},
    {pct:'50%', cls:'bg-warning', label:'Fair'},
    {pct:'75%', cls:'bg-info', label:'Good'},
    {pct:'100%', cls:'bg-success', label:'Strong'},
  ];
  if (score === 0) { bar.style.width='0%'; text.textContent=''; return; }
  const lvl = levels[score-1];
  bar.style.width = lvl.pct;
  bar.className = `progress-bar rounded-pill ${lvl.cls}`;
  text.textContent = lvl.label;
}
</script>
{% endblock %}
{% endblock %}
